# 为 23.05-SNAPSHOT / arm_cortex-a7_neon-vfpv4 产出 ipk（闭源固件无 SDK 时用）
# Actions → build-ipq50xx-23.05 → Run workflow（无需填参数）

name: build-ipq50xx-23.05

on:
  workflow_dispatch:

env:
  TARGET_ARCH: arm_cortex-a7_neon-vfpv4
  FEED_BRANCH: openwrt-23.05
  SDK_VERSION: 23.05.5

jobs:
  build:
    name: arm_cortex-a7_neon-vfpv4-openwrt-23.05
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: build ipk
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ env.TARGET_ARCH }}-${{ env.SDK_VERSION }}
          FEEDNAME: momo
          PACKAGES: luci-app-momo
          NO_REFRESH_CHECK: true

      - name: upload ipk
        uses: actions/upload-artifact@v7
        with:
          name: momo_${{ env.TARGET_ARCH }}-${{ env.FEED_BRANCH }}
          path: bin/packages/${{ env.TARGET_ARCH }}/momo

      - name: install hint
        run: |
          echo '## 路由器安装' >> "$GITHUB_STEP_SUMMARY"
          echo '1. 下载 Artifacts 中的 ipk' >> "$GITHUB_STEP_SUMMARY"
          echo '2. scp 到路由 /tmp/' >> "$GITHUB_STEP_SUMMARY"
          echo '3. 先安装 sing-box，再：' >> "$GITHUB_STEP_SUMMARY"
          echo '```sh' >> "$GITHUB_STEP_SUMMARY"
          echo 'opkg install /tmp/momo_*.ipk /tmp/luci-app-momo_*.ipk' >> "$GITHUB_STEP_SUMMARY"
          echo '# 若提示依赖：opkg install --force-depends /tmp/momo_*.ipk /tmp/luci-app-momo_*.ipk' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo '闭源固件可能与官方 23.05.5 SDK 有差异，仅用于测试。' >> "$GITHUB_STEP_SUMMARY"
