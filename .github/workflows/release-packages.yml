name: release-packages

on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Target branch for selective build (e.g. openwrt-23.05). Leave empty for full matrix.'
        required: false
        type: string
      target_arch:
        description: 'Target arch for selective build (e.g. arm_cortex-a7_neon-vfpv4). Leave empty for full matrix.'
        required: false
        type: string
      sdk_url:
        description: 'Custom SDK download URL (for unofficial targets). Leave empty to use official SDK.'
        required: false
        type: string
  push:
    tags:
      - v*

jobs:
  release:
    name: ${{ matrix.arch }}-${{ matrix.branch }} release
    runs-on: ubuntu-latest
    if: inputs.target_branch == '' && inputs.target_arch == ''
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        arch:
          - arm_cortex-a5_vfpv4
          - arm_cortex-a7_neon-vfpv4
          - arm_cortex-a8_vfpv3
          - arm_cortex-a9
          - arm_cortex-a9_vfpv3-d16
          - arm_cortex-a9_neon
          - arm_cortex-a15_neon-vfpv4
          - aarch64_cortex-a53
          - aarch64_cortex-a72
          - aarch64_cortex-a76
          - aarch64_generic
          - mips_24kc
          - mips_mips32
          - mipsel_24kc
          - mipsel_24kc_24kf
          - mipsel_74kc
          - mipsel_mips32
          - mips64_octeonplus
          - riscv64_riscv64
          - riscv64_generic
          - loongarch64_generic
          - i386_pentium4
          - x86_64
        branch:
          - openwrt-24.10
          - openwrt-25.12
          - SNAPSHOT
        exclude:
          - arch: riscv64_riscv64
            branch: openwrt-25.12
          - arch: riscv64_riscv64
            branch: SNAPSHOT
          - arch: riscv64_generic
            branch: openwrt-24.10

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: build
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.branch }}
          FEEDNAME: momo
          PACKAGES: luci-app-momo
          INDEX: 1
          KEY_BUILD: ${{ secrets.KEY_BUILD }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          NO_REFRESH_CHECK: true

      - name: compress
        run: |
          tar -c -z -f momo_${{ matrix.arch }}-${{ matrix.branch }}.tar.gz -C bin/packages/${{ matrix.arch }}/momo .
          mkdir -p public/${{ matrix.branch }}/${{ matrix.arch }}
          mv bin/packages/${{ matrix.arch }}/momo public/${{ matrix.branch }}/${{ matrix.arch }}
          tar -c -z -f feed_momo_${{ matrix.arch }}-${{ matrix.branch }}.tar.gz public/${{ matrix.branch }}/${{ matrix.arch }}

      - if: github.event_name == 'push' && startsWith(github.ref_name, 'v')
        name: release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            momo_${{ matrix.arch }}-${{ matrix.branch }}.tar.gz

      - name: upload
        uses: actions/upload-artifact@v7
        with:
          name: feed_momo_${{ matrix.arch }}-${{ matrix.branch }}
          path: feed_momo_${{ matrix.arch }}-${{ matrix.branch }}.tar.gz

  release-selective:
    name: ${{ inputs.target_arch }}-${{ inputs.target_branch }} selective release
    runs-on: ubuntu-latest
    if: inputs.target_branch != '' && inputs.target_arch != ''
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: build with official sdk
        if: inputs.sdk_url == ''
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ inputs.target_arch }}-${{ inputs.target_branch }}
          FEEDNAME: momo
          PACKAGES: luci-app-momo
          INDEX: 1
          KEY_BUILD: ${{ secrets.KEY_BUILD }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          NO_REFRESH_CHECK: true

      - name: install dependencies
        if: inputs.sdk_url != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev zlib1g-dev gawk gettext python3-distutils

      - name: build with custom sdk
        if: inputs.sdk_url != ''
        run: |
          wget -q -O sdk.tar.xz "${{ inputs.sdk_url }}"
          tar -x -J -f sdk.tar.xz
          SDK_DIR=$(find . -maxdepth 1 -type d -name '*sdk*' | head -1)
          echo "SDK_DIR=$SDK_DIR" >> "$GITHUB_ENV"

          cd "$SDK_DIR"

          echo "src-link momo $GITHUB_WORKSPACE" >> feeds.conf.default

          make prepare
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          make package/momo/compile V=s
          make package/momo/install V=s
          make package/luci-app-momo/compile V=s
          make package/luci-app-momo/install V=s
          make package/index

      - name: collect packages
        if: inputs.sdk_url != ''
        run: |
          mkdir -p bin/packages/${{ inputs.target_arch }}/momo
          find "$SDK_DIR/bin" -name "*.ipk" -path "*/momo/*" -exec cp {} bin/packages/${{ inputs.target_arch }}/momo/ \;

      - name: compress
        run: |
          tar -c -z -f momo_${{ inputs.target_arch }}-${{ inputs.target_branch }}.tar.gz -C bin/packages/${{ inputs.target_arch }}/momo .
          mkdir -p public/${{ inputs.target_branch }}/${{ inputs.target_arch }}
          mv bin/packages/${{ inputs.target_arch }}/momo public/${{ inputs.target_branch }}/${{ inputs.target_arch }}
          tar -c -z -f feed_momo_${{ inputs.target_arch }}-${{ inputs.target_branch }}.tar.gz public/${{ inputs.target_branch }}/${{ inputs.target_arch }}

      - name: upload
        uses: actions/upload-artifact@v7
        with:
          name: feed_momo_${{ inputs.target_arch }}-${{ inputs.target_branch }}
          path: feed_momo_${{ inputs.target_arch }}-${{ inputs.target_branch }}.tar.gz

  feed:
    needs: [release, release-selective]
    name: feed
    runs-on: ubuntu-latest
    if: always() && (needs.release.result == 'success' || needs.release-selective.result == 'success')

    steps:
      - name: download
        uses: actions/download-artifact@v8
        with:
          pattern: feed_momo_*
          merge-multiple: true

      - name: uncompress
        run: |
          for file in feed_momo_*.tar.gz; do tar -x -z -f "$file"; done

      - name: prepare
        run: |
          echo "${{ secrets.KEY_BUILD_PUB }}" > public/key-build.pub
          echo "${{ secrets.PUBLIC_KEY }}" > public/public-key.pem
          tree --dirsfirst --sort name -P '*.apk|*.ipk' --prune --noreport -H "" -T "Momo's Feed" --charset utf-8 -o public/index.html public
          sed -i '/<p class="VERSION">/,/<\/p>/d' public/index.html

      - name: feed
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy public --project-name=momomomo
